services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - django_static:/app/static
      - django_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ../frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - INTERNAL_API_URL=http://backend:8000/api/v1
      - AUTH_SECRET=your_nextauth_secret_key_change_me
      - AUTH_TRUST_HOST=true
    depends_on:
      - backend

  celery_worker:
    build: ../backend
    command: celery -A config worker -l info
    volumes:
      - ../backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery_beat:
    build: ../backend
    command: celery -A config beat -l info
    volumes:
      - ../backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  django_static:
  django_media:
